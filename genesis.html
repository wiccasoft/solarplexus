<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Küp + İç Piramitler + Plus + Tetrahedronlar</title>
  <style>
    body { margin: 0; background-color: black; }
    canvas { display: block; }
  </style>
</head>
<body>
<button onclick="setPoles('topBackLeft','bottomFrontRight')">Beyaz–Siyah</button>
<button onclick="setPoles('topFrontRight','bottomBackLeft')">Kırmızı–Yeşil</button>
<button onclick="setPoles('topFrontLeft','bottomBackRight')">Mavi–Turuncu</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.146/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.146/examples/js/controls/OrbitControls.js"></script>
<script>


// ============================================================================
// BÖLÜM 1: SENEKRONE GEOMETRİ SİSTEMİ VE KURULUM MATRİSİ
// ============================================================================
const scene = new THREE.Scene(); // Önce sahne oluşturulur
const KuantumKafesi = new THREE.Group(); // Sonra grup açılır ve sahneye eklenir
scene.add(KuantumKafesi);

let currentAxis; // Sahnedeki aktif elektromanyetik eksen mili


function setPoles(northName, southName) {
function setPoles(northName, southName) {
  if (currentAxis) scene.remove(currentAxis);

  const northSphere = scene.getObjectByName(northName);
  const southSphere = scene.getObjectByName(southName);
  if (!northSphere || !southSphere) return;

  const northPos = northSphere.position;
  const southPos = southSphere.position;

  const direction = new THREE.Vector3().subVectors(northPos, southPos).normalize();
  const centerPos = new THREE.Vector3().addVectors(northPos, southPos).multiplyScalar(0.5);

  const length = 10;
  const from = centerPos.clone().add(direction.clone().multiplyScalar(-length));
  const to   = centerPos.clone().add(direction.clone().multiplyScalar(length));

  const axisGeom = new THREE.BufferGeometry().setFromPoints([from,to]);
  const axisMat = new THREE.LineBasicMaterial({color:0x00ff00});
  currentAxis = new THREE.Line(axisGeom, axisMat);
  scene.add(currentAxis);

  // 🔑 Kamerayı yeni eksene hizala
  camera.position.copy(centerPos.clone().add(direction.clone().multiplyScalar(10)));
  camera.lookAt(centerPos);
  controls.target.copy(centerPos);
  controls.update();
}

  // Kutup kürelerini bul
  const northSphere = scene.getObjectByName(northName);
  const southSphere = scene.getObjectByName(southName);

  if (!northSphere || !southSphere) {
    console.warn("Küre bulunamadı:", northName, southName);
    return;
  }

  // Pozisyonları al
  const northPos = northSphere.position;
  const southPos = southSphere.position;

  // Çizgiyi uzatmak için doğrultu ve merkez
  const direction = new THREE.Vector3().subVectors(northPos, southPos).normalize();
  const centerPos = new THREE.Vector3().addVectors(northPos, southPos).multiplyScalar(0.5);

  const length = 10;
  const from = centerPos.clone().add(direction.clone().multiplyScalar(-length));
  const to   = centerPos.clone().add(direction.clone().multiplyScalar(length));

  // Yeni ekseni çiz
  const axisGeom = new THREE.BufferGeometry().setFromPoints([from,to]);
  const axisMat = new THREE.LineBasicMaterial({color:0x00ff00});
  currentAxis = new THREE.Line(axisGeom, axisMat);
  scene.add(currentAxis);
}
  // Ortografik kamera
  const aspect = window.innerWidth / window.innerHeight;
  const d = 2;
  const camera = new THREE.OrthographicCamera(
    -d * aspect, d * aspect, d, -d, 0.1, 1000
  );
  camera.position.set(5, 5, 5);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // OrbitControls → pan ve zoom açık
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enablePan = true;
  controls.enableZoom = true;
  controls.enableRotate = true;

  

  // Döndürme sınırlarını kaldır
// Döndürme sınırlarını tamamen kaldır
controls.minPolarAngle = -Infinity;
controls.maxPolarAngle = Infinity;
controls.minAzimuthAngle = -Infinity;
controls.maxAzimuthAngle = Infinity;

  scene.add(new THREE.AmbientLight(0xffffff));

  // Küp köşeleri
  const corners = [
    new THREE.Vector3(0.5,0.5,0.5),
    new THREE.Vector3(0.5,0.5,-0.5),
    new THREE.Vector3(0.5,-0.5,0.5),
    new THREE.Vector3(0.5,-0.5,-0.5),
    new THREE.Vector3(-0.5,0.5,0.5),
    new THREE.Vector3(-0.5,0.5,-0.5),
    new THREE.Vector3(-0.5,-0.5,0.5),
    new THREE.Vector3(-0.5,-0.5,-0.5)
  ];

  // Yüzeyler: köşeler + merkez + normal
  const faces = [
    {corners:[corners[0], corners[2], corners[3], corners[1]], center:new THREE.Vector3(0.5,0,0), normal:new THREE.Vector3(1,0,0)},
    {corners:[corners[4], corners[6], corners[7], corners[5]], center:new THREE.Vector3(-0.5,0,0), normal:new THREE.Vector3(-1,0,0)},
    {corners:[corners[0], corners[4], corners[5], corners[1]], center:new THREE.Vector3(0,0.5,0), normal:new THREE.Vector3(0,1,0)},
    {corners:[corners[2], corners[6], corners[7], corners[3]], center:new THREE.Vector3(0,-0.5,0), normal:new THREE.Vector3(0,-1,0)},
    {corners:[corners[0], corners[2], corners[6], corners[4]], center:new THREE.Vector3(0,0,0.5), normal:new THREE.Vector3(0,0,1)},
    {corners:[corners[1], corners[3], corners[7], corners[5]], center:new THREE.Vector3(0,0,-0.5), normal:new THREE.Vector3(0,0,-1)}
  ];

  // Sarı kareler + gri “+” işaretleri
  faces.forEach(f=>{
    const squareVertices = [];
    for (let i=0; i<f.corners.length; i++) {
      squareVertices.push(...f.corners[i].toArray());
      squareVertices.push(...f.corners[(i+1)%4].toArray());
    }
    const squareGeom = new THREE.BufferGeometry();
    squareGeom.setAttribute('position', new THREE.Float32BufferAttribute(squareVertices,3));
    const squareMat = new THREE.LineBasicMaterial({color:0xffff00});
    //scene.add(new THREE.LineSegments(squareGeom, squareMat));
    KuantumKafesi.add(new THREE.LineSegments(squareGeom, squareMat));

    const u = new THREE.Vector3(f.normal.y, f.normal.z, f.normal.x).normalize();
    const v = new THREE.Vector3().crossVectors(f.normal, u).normalize();
    const plusVertices = [];
    plusVertices.push(...f.center.clone().add(u.clone().multiplyScalar(0.5)).toArray());
    plusVertices.push(...f.center.clone().add(u.clone().multiplyScalar(-0.5)).toArray());
    plusVertices.push(...f.center.clone().add(v.clone().multiplyScalar(0.5)).toArray());
    plusVertices.push(...f.center.clone().add(v.clone().multiplyScalar(-0.5)).toArray());
    const plusGeom = new THREE.BufferGeometry();
    plusGeom.setAttribute('position', new THREE.Float32BufferAttribute(plusVertices,3));
    const plusMat = new THREE.LineBasicMaterial({color:0xaaaaaa});
    //scene.add(new THREE.LineSegments(plusGeom, plusMat));
    KuantumKafesi.add(new THREE.LineSegments(plusGeom, plusMat));
  });

  // Eksenler
  function addAxis(color, from, to) {
    const axisGeom = new THREE.BufferGeometry().setFromPoints([from,to]);
    const axisMat = new THREE.LineBasicMaterial({color:color});
    scene.add(new THREE.Line(axisGeom, axisMat));
  }
 // addAxis(0xff0000, new THREE.Vector3(-10,0,0), new THREE.Vector3(10,0,0));
 // addAxis(0x00ff00, new THREE.Vector3(0,-10,0), new THREE.Vector3(0,10,0));
 // addAxis(0x0000ff, new THREE.Vector3(0,0,-10), new THREE.Vector3(0,0,10));



// Beyaz ve siyah kürelerin pozisyonları
const whitePos = new THREE.Vector3(-0.25, 0.25, -0.25);
const blackPos = new THREE.Vector3(0.25, -0.25, 0.25);


// Yeşil eksen: beyaz ve siyah küreleri birleştiren çizgi
addAxis(0x00ff00, blackPos, whitePos);




  // Merkezden köşelere çizgiler (beyaz)
  const center = new THREE.Vector3(0,0,0);
  const pyramidVertices = [];
  corners.forEach(c=>{
    pyramidVertices.push(...center.toArray());
    pyramidVertices.push(...c.toArray());
  });
  const pyramidGeom = new THREE.BufferGeometry();
  pyramidGeom.setAttribute('position', new THREE.Float32BufferAttribute(pyramidVertices,3));
  const pyramidMat = new THREE.LineBasicMaterial({color:0xffffff});
  //scene.add(new THREE.LineSegments(pyramidGeom, pyramidMat));
  KuantumKafesi.add(new THREE.LineSegments(pyramidGeom, pyramidMat));
  // Tetrahedron köşeleri (küçük ölçekli, kübün içinde)
// ============================================================================
// BÖLÜM 6: AKSA HİZALI KUTSAL MERKABA KÖŞELERİ (Satır 171 - 182 ARASI)
// ============================================================================
// Tetrahedron 1: Beyaz Kutup merkezli göksel enerji piramidi
const tetra1 = [
  new THREE.Vector3(-0.25,  0.25, -0.25), // topBackLeft -> BEYAZ KUTUP (Tepe)
  new THREE.Vector3( 0.25,  0.25,  0.25), // topFrontRight -> KIRMIZI
  new THREE.Vector3( 0.25, -0.25, -0.25), // bottomBackRight -> TURUNCU
  new THREE.Vector3(-0.25, -0.25,  0.25)  // bottomFrontLeft -> MOR
];

// Tetrahedron 2: Siyah Kutup merkezli yersel manyetik piramit
const tetra2 = [
  new THREE.Vector3( 0.25, -0.25,  0.25), // bottomFrontRight -> SİYAH KUTUP (Taban)
  new THREE.Vector3(-0.25, -0.25, -0.25), // bottomBackLeft -> YEŞİL
  new THREE.Vector3( 0.25,  0.25, -0.25), // topBackRight -> SARI
  new THREE.Vector3(-0.25,  0.25,  0.25)  // topFrontLeft -> MAVİ
];
  function addTetrahedron(vertices, color) {
    const edges = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
    const tetraVertices = [];
    edges.forEach(e=>{
      tetraVertices.push(...vertices[e[0]].toArray());
      tetraVertices.push(...vertices[e[1]].toArray());
    });
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(tetraVertices,3));
    const mat = new THREE.LineBasicMaterial({color:color});
    //scene.add(new THREE.LineSegments(geom, mat));
      KuantumKafesi.add(new THREE.LineSegments(geom, mat));
  }

  // Beyaz ve gri tetrahedron ekle
  addTetrahedron(tetra1, 0xffffff);
  addTetrahedron(tetra2, 0xaaaaaa);// Küre materyali (saydam)

  
const sphereRadius = 0.2; // küçük küreler küpün içine sığacak

// 8 küre objesi (renkler doğru eşleşme ile)
// ============================================================================
// ADIM 2: KUTSAL MATEMATİK VE ENERJİ UYUMLU ODA KİMLİKLERİ (Satır 223)
// ============================================================================
// Kutsal girdap matrisine uygun olarak id'ler ve Türkçe isimler güncellendi.
// 3 (Beyaz) ve 6 (Siyah) manyetik kutup olarak işaretlendi.
const spheres = [
  { id: 1, name: "KIRMIZI_ENERJI_ODASI", pos: new THREE.Vector3( 0.25,  0.25,  0.25), color: 0xff0000, isPole: false },
  { id: 2, name: "TURUNCU_EMICI_ODA",    pos: new THREE.Vector3( 0.25,  0.25, -0.25), color: 0xff6600, isPole: false },
  { id: 4, name: "SARI_ITICI_ODA",       pos: new THREE.Vector3( 0.25, -0.25, -0.25), color: 0xffff00, isPole: false },
  { id: 8, name: "YESIL_ENERJI_ODASI",   pos: new THREE.Vector3(-0.25, -0.25, -0.25), color: 0x00ff00, isPole: false },
  { id: 7, name: "MAVI_KALKAN_ODASI",    pos: new THREE.Vector3(-0.25, -0.25,  0.25), color: 0x0000ff, isPole: false },
  { id: 5, name: "MOR_KABUK_ODASI",      pos: new THREE.Vector3(-0.25,  0.25,  0.25), color: 0x660099, isPole: false },
  { id: 3, name: "BEYAZ_KUTUP_ODASI",    pos: new THREE.Vector3(-0.25,  0.25, -0.25), color: 0xffffff, isPole: true },
  { id: 6, name: "SIYAH_KUTUP_ODASI",    pos: new THREE.Vector3( 0.25, -0.25,  0.25), color: 0x222222, isPole: true }
];

// ============================================================================
// ADIM 5: ODALARI BAŞLANGIÇTA YARI SAYDAM CAMA DÖNÜŞTÜRME (Satır 245 - 258)
// ============================================================================
spheres.forEach(s => {
  const geom = new THREE.SphereGeometry(sphereRadius, 32, 32);
  
  // Siyah ve Beyaz kutup mili kalıcı parlar, diğer odalar (124875) başlangıçta loş ve saydamdır
  const mat = new THREE.MeshPhongMaterial({
    color: s.color,
    emissive: s.color,
    emissiveIntensity: s.isPole ? 1.0 : 0.05, // Başlangıçta neredeyse sıfır emisyon
    transparent: true,
    opacity: s.isPole ? 1.0 : 0.15           // Başlangıçta %15 alfa (yarı saydam cam kafes)
  });
  
  const sphere = new THREE.Mesh(geom, mat);
  sphere.position.copy(s.pos);
  sphere.name = s.name; 
  KuantumKafesi.add(sphere);
});

// Küre materyali (saydam)
const sphereMaterial = new THREE.MeshPhongMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.25
});

// Merkezde ana küre
const centerSphereGeom = new THREE.SphereGeometry(0.3, 32, 32);
const centerSphereMat = new THREE.MeshPhongMaterial({
  color: 0xffffff,
  emissive: 0xff00ff,
  emissiveIntensity: 0.6,
  transparent: true,
  opacity: 0.4
});

const centerSphere = new THREE.Mesh(centerSphereGeom, centerSphereMat);
centerSphere.position.set(0,0,0);
scene.add(centerSphere);

// 6 küreyi etrafına yerleştir
const offsets = [
  new THREE.Vector3(0.5,0,0),   // sağ
  new THREE.Vector3(-0.5,0,0),  // sol
  new THREE.Vector3(0,0.5,0),   // üst
  new THREE.Vector3(0,-0.5,0),  // alt
  new THREE.Vector3(0,0,0.5),   // ön
  new THREE.Vector3(0,0,-0.5)   // arka
];

offsets.forEach(pos => {
  const sphereGeom = new THREE.SphereGeometry(0.3, 32, 32);
  const sphere = new THREE.Mesh(sphereGeom, sphereMaterial.clone());
  sphere.position.copy(pos);
  scene.add(sphere);
});


// Top view butonu için
function setTopView(camera, controls) {
  // Kamerayı yukarıya sabitle
  camera.position.set(0, 10, 0); 
  camera.lookAt(0, 0, 0);

  // Eğer OrbitControls kullanıyorsan:
  controls.target.set(0, 0, 0);
  controls.update();
}

// ============================================================================
// BÖLÜM 3: 124875 GİRDAP VERİ PAKETİ SINIFI (Satır 309 - 312 ARASI)
// ============================================================================
class KuantumPaketi {
    constructor(kaynakMesh, hedefMesh, renk) {
        this.kaynak = kaynakMesh; // Canlı dönen odanın kendisine mühürlendi
        this.hedef = hedefMesh;
        this.ilerleme = 0.0;
        
        // Akış esnasında çıplak gözle izlenecek plazma ışık noktası
        const pGeom = new THREE.SphereGeometry(0.04, 16, 16);
        const pMat = new THREE.MeshBasicMaterial({ color: renk });
        this.mesh = new THREE.Mesh(pGeom, pMat);
        this.mesh.position.copy(this.kaynak.position);
        
        // Paket de dönen kilitli kafese eklenmeli ki koordinatları şaşmasın!
        KuantumKafesi.add(this.mesh);
    }

    guncelle(delta) {
        this.ilerleme += delta * 2.0; // Enerji akış hızı
        // Dönen odaların anlık pozisyonları arasında sarmal takip hesaplaması
        this.mesh.position.lerpVectors(this.kaynak.position, this.hedef.position, this.ilerleme);
    }
}



// ============================================================================
// BÖLÜM 4: DOUBLE VORTEX VE KUTSAL KAN POMPALAMA MOTORU
// ============================================================================
// Global veri paket takibi dizisi ve Rodin dizilimi
let aktifPaketler = [];
//const rodinDizisi =[1,2,4,8,7,5];
// 🌪️ ÇİFT GİRDAP DİZİLİMLERİ (Örnek Rodin dizilimi)
const rodinDizisiA = [1, 2, 4, 8, 7, 5]; // Saat Yönü Tersi
const rodinDizisiB = [8, 7, 5, 1, 2, 4]; // Saat Yönü (Ters Pompa)

//let aktifDiziIndex = 0;
let aktifIndexA = 0;
let aktifIndexB = 0;


// ============================================================================
// BÖLÜM 2: JROSKOPİK DÖNÜŞ MOTORU VE ANİMASYON DÖNGÜSÜ (Satır 312 - SONU)
// ============================================================================
let globalDönüşHızı = 0.005; // Kararlı baseline dönüş momentumu

// ============================================================================
// BÖLÜM 5: TERS KARE KANUNU ($1/r^2$) VE DİNAMİK DOMİNO MOTORU
// ============================================================================
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    // Dönen KuantumKafesi içindeki canlı Siyah, Beyaz ve Merkez odaları havada yakala
    const beyazKutupObj = KuantumKafesi.getObjectByName("BEYAZ_KUTUP_ODASI");
    const siyahKutupObj = KuantumKafesi.getObjectByName("SIYAH_KUTUP_ODASI");
    const merkezCekirdek = KuantumKafesi.getObjectByName("MERKEZ_HADRON_USSU") || scene.getObjectByName("centerSphere");

    if (beyazKutupObj && siyahKutupObj) {
        // Bilardo Topu Etkisi: Siyah (+1 Sağ Tork), Beyaz (-1 Sol Tork) kiral aksı
        const anaAksVektoru = new THREE.Vector3().subVectors(beyazKutupObj.position, siyahKutupObj.position).normalize();

        // ============================================================================
// BÖLÜM 4 & 5 KÖPRÜSÜ: DİNAMİK ÇİFT GLUON FIRLATICI (Satır 374 - 380)
// ============================================================================
if (aktifPaketler.length === 0) {
    // A Tarafı: Saat Yönünün Tersi Akış (1 -> 2 -> 4 -> 8 -> 7 -> 5)
    let idA = rodinDizisiA[aktifIndexA];
    let sonrakiIdA = rodinDizisiA[(aktifIndexA + 1) % rodinDizisiA.length];
    let kaynakDataA = spheres.find(o => o.id === idA);
    let hedefDataA = spheres.find(o => o.id === sonrakiIdA);

    // B Tarafı: Saat Yönü Ters Pompa Akış (8 -> 7 -> 5 -> 1 -> 2 -> 4)
    let idB = rodinDizisiB[aktifIndexB];
    let sonrakiIdB = rodinDizisiB[(aktifIndexB + 1) % rodinDizisiB.length];
    let kaynakDataB = spheres.find(o => o.id === idB);
    let hedefDataB = spheres.find(o => o.id === sonrakiIdB);

    let canlıKaynakA = KuantumKafesi.getObjectByName(kaynakDataA.name);
    let canlıHedefA  = KuantumKafesi.getObjectByName(hedefDataA.name);
    let canlıKaynakB = KuantumKafesi.getObjectByName(kaynakDataB.name);
    let canlıHedefB  = KuantumKafesi.getObjectByName(hedefDataB.name);

    if (canlıKaynakA && canlıHedefA && canlıKaynakB && canlıHedefB) {
        // Gluon A fırlatılıyor
        let paketA = new KuantumPaketi(canlıKaynakA, canlıHedefA, hedefDataA.color);
        paketA.hedefId = sonrakiIdA;
        aktifPaketler.push(paketA);

        // Gluon B fırlatılıyor (Zıt Kan Pompası)
        let paketB = new KuantumPaketi(canlıKaynakB, canlıHedefB, hedefDataB.color);
        paketB.hedefId = sonrakiIdB;
        aktifPaketler.push(paketB);
    }
}
        }

// --- 2. TERS KARE KANUNU ($1/r^2$) PARÇACIK HAREKET DÖNGÜSÜ ---
        let vuruşOldu = false;
        let dinamikTorkEtkisi = 0;

        for (let i = aktifPaketler.length - 1; i >= 0; i--) {
            let paket = aktifPaketler[i];
            
            let hedefData = spheres.find(o => o.id === paket.hedefId);
            let hedefMesh = KuantumKafesi.getObjectByName(hedefData.name);

            if (hedefMesh && paket.mesh) {
                // Parçacık ile hedef oda arasındaki anlık mesafeyi (r) hesapla
                let r = paket.mesh.position.distanceTo(hedefMesh.position);
                r = Math.max(0.1, r); // Sıfıra bölünme hatasını engelle

                // 🔑 TERS KARE İVME MOTORU: Yaklaştıkça katlanarak hızlandır
                let dinamikIvme = (1.0 / (r * r)) * 0.5;
                paket.ilerleme += delta * Math.min(4.0, 1.5 + dinamikIvme);

                paket.guncelle(delta);

                // Merkez Tekillik Girişimi: Gluonlar merkeze yaklaştıkça oda ışığını besler
                if (paket.ilerleme >= 0.48 && paket.ilerleme <= 0.52 && centerSphere) {
                    centerSphere.material.emissiveIntensity = Math.min(6.0, centerSphere.material.emissiveIntensity + 0.15);
                }

                // Parçacık hedefe tam ulaştığında (Vuruş Anı)
                if (paket.ilerleme >= 1.0) {
                    hedefMesh.material.emissiveIntensity = 4.0;
                    hedefMesh.material.opacity = 1.0;

                    // Bilardo Sürtünme Torku Transferi
                    let polariteYonu = (hedefData.id % 2 === 0) ? 1 : -1; 
                    dinamikTorkEtkisi += 0.04 * polariteYonu * (1.0 / r); 

                    KuantumKafesi.remove(paket.mesh);
                    aktifPaketler.splice(i, 1);
                    vuruşOldu = true;
                }
            }
        }

       // --- 3. DİNAMİK SPIN REAKSİYONU (DÜZELTİLMİŞ) ---
        if (vuruşOldu && aktifPaketler.length === 0) {
            // Kapsam hatası çözüldü
            KuantumKafesi.rotateOnAxis(anaAksVektoru, dinamikTorkEtkisi);
            aktifIndexA = (aktifIndexA + 1) % rodinDizisiA.length;
            aktifIndexB = (aktifIndexB + 1) % rodinDizisiB.length;
        }

        // --- 4. FRAKTAL DEŞARJ DÖNGÜSÜ ---
        // ... [Fraktal deşarj mantığı] ...
     // 🔑 Kapsam bloğu `if (beyazKutupObj...` düzeltildi.

        // --- 4. FRAKTAL DEŞARJ DÖNGÜSÜ ---
        spheres.forEach(s => {
            if (!s.isPole) {
                let odaMesh = KuantumKafesi.getObjectByName(s.name);
                if (odaMesh) {
                    if (odaMesh.material.emissiveIntensity > 0.05) odaMesh.material.emissiveIntensity -= delta * 3.8;
                    if (odaMesh.material.opacity > 0.15) odaMesh.material.opacity -= delta * 2.2;
                }
            }
        });
    }

    if (typeof controls !== 'undefined') controls.update();
    renderer.render(scene, camera);
}
